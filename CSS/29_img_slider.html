<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        .slider-wrapper {
            box-sizing: border-box;
            position: relative;
            width: 1200px;
            height: 400px;
            margin: auto;
            border: 1px solid #ccc;
            text-align: center;
        }
        .slider-wrapper img {
            width: 800px;
            height: 400px;
        }
        button {
            position: absolute;
            top: 50%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            font-size: 2rem;
        }
        .btn-prev { left: 50px;}
        .btn-next { right: 50px;}
        button:hover {
            color: #333;
            background-color: rgb(206, 193, 159);
        }
    </style>
</head>
<body>
    <h1>Image Slider</h1>
    <div class="slider-wrapper">
        <img src="../images/Mad.jpg" alt="movie poster">
        <button class="btn-prev">&lt</button>
        <button class="btn-next">&gt</button>
    </div>
</body>
</html>
