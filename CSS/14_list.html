<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ist</title>
    <meta name="description" content="List">
    <style>
        ul {
            background-color: aquamarine;
            list-style-type: square;
            padding: 10;
        }
        ol {
            background-color: red;
            list-style-type: '❤';
            padding: 20;
        }
        li {
            background-color: yellow;
            
        }
        h3 {
            border: 1px solid blue;
        }
    </style>
</head>
<body>
    <h1>List Style</h1>
    <ul>
        <h3>Front End</h3>
        <li>HTML</li>
        <li>css</li>
        <li>JAVA</li>
    </ul>
    <ol>
        <h3>back end</h3>
        <li>JSP</li>
        <li>ASP</li>
        <li>NOdeJs</li>
    </ol>
</body>
</html>
