<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin-Auto</title>
</head>
<style>
    h1 {
        width: 50%;
        height: 200px;
        background-color: aquamarine;
        margin: auto;
    }
    div {
        width: 50%;
        height: 500px;
        background-color: tomato;
    }
    p {
        width: 800px;
        background-color: white;
        margin: auto;
    }
</style>
<body>
    <h1>Margin-auto</h1>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Reiciendis at sapiente nulla aliquid modi rem eius? 
            Aperiam doloribus natus voluptas. Soluta molestiae 
            non tempore qui et, nesciunt ea earum blanditiis.</p>
    </div>
    
</body>
</html>
