<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>starbusts homepage menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nanum Gothic';
            background-color: rgb(246, 245, 239);}
        header {
            width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }

        ul {
            list-style: none;
        }

        .header-menu-top ul,
        .header-menu-bottom ul {
            display: flex;
            justify-content: right;
            text-decoration: none;
        }

        .header-menu-top ul {
            gap: 20px;
            font-size: .85em;
        }
        .header-menu-bottom ul {
            gap: 40px;
            font-size: .95em;
        }

    </style>
</head>

<body>
    <header>
        <div class="header-top-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customar Service & ideas</a></li>
                    <li><a href="#">Find a Stroe</a></li>
                    <li><a href="#"><i class="fa-brands fa-sistrix"></i></a></li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>

</html>
