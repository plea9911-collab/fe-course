<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body>
    <h1>회원가입</h1>
    <div>
        <a href="#field2">기타 항목 입력</a>
        <form action="#" method="get">
            <fieldset>
                <legend>개인 정보 입력</legend>
                <ul>
                    <li>
                        <label for="id">아이디</label>
                        <input type="text" name="id" placeholder="아이디를 입력하세요">
                    </li>
                    <li>
                        <label for="password">비밀번호</label>
                        <input type="text" name="password">
                    </li>
                    <li>
                        <label for="name">이름</label>
                        <input type="text" name="name">
                    </li>
                </ul>
                <fieldset>
                    <legend>주소 선택 태그</legend>
                    <ul>
                        <li>
                            <label for="address1">주소1</label>
                            <input type="text">
                        </li>
                        <li>
                            <label for="address2">주소2</label>
                            <input type="radio" name="address2" value="서울시"><span>서울시</span>
                            <input type="radio" name="address2" value="인천시"><span>인천시</span>
                            <input type="radio" name="address2" value="부산시"><span>부산시</span>
                        </li>
                        <li>
                            <label for="address3">주소3</label>
                            <input type="checkbox" name="address3" value="서울시"><span>서울시</span>
                            <input type="checkbox" name="address3" value="인천시"><span>인천시</span>
                            <input type="checkbox" name="address3" value="부산시"><span>부산시</span>
                        </li>
                        <li>
                            <label for="address4">주소4</label>
                            <select name="choice">
                                <option value="choice">주소 선택</option>
                                <option value="서울시">서울시</option>
                                <option value="인천시">인천시</option>
                                <option value="부산시">부산시</option>
                            </select>
                        </li>
                    </ul>
                </fieldset>
                <ul>
                    <li>
                        <label for="birthday">생년월일</label>
                        <input type="date" name="birthday">
                    </li>
                    <li>
                        <label for="photo">프로필사진업로드</label>
                        <input type="file" name="photo">
                    </li>
                    <li>
                        <label for="content">자기소개</label>
                        <textarea name="intro" placeholder="100자 이내로 작성해주세요." cols="50" rows="10"></textarea>
                    </li>
                    <li>
                        <button type="submit">전송</button>
                        <button type="button">전송(모양만 버튼, 이벤트X)</button>
                        <button type="reset">다시쓰기</button>
                    </li>
                </ul>
                <fieldset id="field2">
                    <legend>기타 항목 입력</legend>
                </fieldset>
            </fieldset>
        </form>
    </div>
</body>

</html>
