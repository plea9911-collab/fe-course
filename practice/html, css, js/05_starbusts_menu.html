<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Menu</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nanum Gothic';
            /* background-color: rgb(246, 245, 239); */ } 
        header {
            /* border: 1px solid rgb(105, 86, 86); */
            width: 1000px;
            margin: auto;
            display: flex;  
            justify-content: space-between;          
        }
        .header-menu-top ul, 
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
        }
        .header-menu-top ul { 
            gap: 20px;
            font-size: .8rem;
        }
        .header-menu-bottom ul { gap: 30px; }
        .header-menu-top ul a, 
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a {
            letter-spacing: .5px;
            font-size: .9em;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding:4px;
            background-color: white;
        }
        .header-menu-top li:last-child {
            font-size: 1.5em;
            font-weight: 700;
            background-color: white;
        }
        .header-menu-top li:last-child input {
            display: none;
        }
        .star-bg-wrap {
        width: 100%;
        /* height: 640px; */
        height: 33.3vw; /* viewport vm = (이미지출력 높이(px)/vw너비(가로해상도)) *100 */
        background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
        background-repeat: no-repeat;
        background-position: center; /* center= 50%  50% */
        background-size: cover;
        }
        .star-bg-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .img1, .img2, .img3, .img4, .img5, .img6, .button { 
            animation: fadeInUP 5s ease forwards; display: inline-block;}
        .img1 { animation-delay: 0.5s; }
        .img2 { animation-delay: 1s; }
        .img3 { animation-delay: 1.5s; }
        .img4 { animation-delay: 2s; }
        .img5 { animation-delay: 2.5s; }
        .img6 { animation-delay: 3s; }
        .button  { animation-delay: 3.5s; }
            @keyframes fadeInUP {
                from {
                    opacity: 0;
                    /* transform: translateX(50px); */
                }
                to {
                    opacity: 1;
                }
        }
        .img1 {
            position: absolute;
            width: 23.5%;
            left: 11.4%;
        }
        .img2 {
            position: absolute;
            z-index: 10;
            top: 17.03%;
            left: 35.35%;
            width: 11.3%; 
        }
        .img3 {
            position: absolute;
            z-index: 10;
            top: 26.471%;
            left: 44.4%;
            width: 10.95%;
        }
        .img4 {
            position: absolute;
            z-index: 10;
            top: 16.874%;
            left: 50.7%;
            width: 13.5%; 
        }
        .img5 {
            position: absolute;
            z-index: 9;
            top: 16.874%;
            left: 62%;
            width: 11.15%;
        }
        .img6 {
            position: absolute;
            z-index: 8;
            top: 16.874%;
            left: 70.2%;
            width: 11.5%;
        }
        .button {
            border: 2px solid rgb(172, 133, 186);
            padding: 10px 25px;
            border-radius: 4px;
            text-decoration: none;
            position: absolute;
            z-index: 10;
            top: 59.29%;
            left: 11.35%;
            text-align: center;
            animation: changColor;
            animation-duration: 2s;
            animation-delay: 1s;
        }
        .button:hover {
            animation: changeColor 1s;
        }
        @keyframes changeColor {
            from {
                /* 애니메이션 시작 시 스타일 정의*/
                background-color: none;
            }
            to {
                /* 애니메이션 종료 시 스타일 정의*/
                background-color: rgb(172, 133, 186);
            }
        }
        div a { text-decoration: none ;
                color: rgb(172, 133, 186);}
        img { max-width: 100%; }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text">
                        <a href="#"><i class="fa-brands fa-sistrix"></i></a></li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="star-bg-wrap">
        <div class="menu-img">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" alt="menu" class="img1">
            <div class="button"><a href="#">자세히 보기</a></div>
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="menu" class="img2">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="menu" class="img3">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="menu" class="img4">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="menu" class="img5">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="menu" class="img6">
            
    </div>
    </div>
</body>
</html>
