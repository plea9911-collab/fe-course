<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header></header>
    <main>
        <section>
    <h1>웹 개발 교육 상담 문의</h1>
    <p>HTML, JavaScript, React, 프론트엔드 교육 과정에 
        대해 궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해 드립니다.</p>
        <form action="#" method="get">
        
    <fieldset>
            <legend>상담 신청 정보</legend>
            <div>
                <label for="name">이름<span>*</span></label> <!--span 대신 sup가능-->
                <input type="text" name="name" placeholder="이름을 입력하세요">
                <p>실명을 입력해 주세요.</p>
            </div>
            <div>
                <label for="email">이메일<span>*</span></label>
                <input type="text" name="email" placeholder="emample@email.com">
                <p>답병을 받을 이메일 주소를 입력해 주세요.</p>
            </div>
            <div>
                <label for="contect">연락처</label>
                <input type="tel" name="contect" placeholder="010-0000-0000">
            </div>
            <div>
                <label for="course">관심과정</label>
                <select name="course">
                <option value="선택">선택하세요</option>
                <option value="html-css">HTML-CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="react">React</option>
                <option value="fullstack">Fullstack 개발자</option>
                </select>
            </div>
            <div>
                    <label for="message">문의 내용<span>*</span></label>
                    <textarea name="message" cols="20" rows="2" placeholder="궁금한 내용을 자세히 입력해주세요."></textarea>
                <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
            </div> <!--개인정보 동의-->
                    <input type="checkbox" name="agree">
                    <label for="agree">개인정보 수집 및 이용에 동의합니다<sup>*</sup></label>
            <div>
                <button type="submit">상담 문의 보내기</button>
            </div>
        </fieldset>
    </form>
    </section>
    </main>
</body>
</html>
