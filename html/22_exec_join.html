<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>

<body>
    <h1>회원가입</h1>
    <form action="#" method="get">
        <ul>
            <li>
                <div>필수항목</div>
            </li>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id">
            </li>
            <li>
                <label for="pass">비밀번호</label>
                <input type="password" name="pass">
            </li>
            <li>
                <label for="email">이메일</label>
                <input type="email" name="email" placeholder="example@example.com">
            </li>
            <li>
                <label for="name">성명</label>
                <input type="name" name="name" placeholder="홍길동">
            </li>
            <li>
                <label for="age">나이</label>
                <input type="age" name="age">
            </li>
            <li>
                <div>당신에 대해서 알고 싶어요!</div>
            </li>
            <li>
                <label for="">취미를 선택해 주세요</label>
                <input type="radio" name="hoddy" value="game"><span>게임하기</span>
                <input type="radio" name="hoddy" value="music"><span>음악듣기</span>
                <input type="radio" name="hoddy" value="icedrink"><span>아이스음료 마시기</span>
            </li>
            <li>
                <label for="select-drink">좋아하는 음료 선택해 주세요. (중복선택가능)</label>
                <input type="checkbox" name="select-drink" value="shake"><span>쉐이크</span>
                <input type="checkbox" name="select-drink" value="tea"><span>티(tea)</span>
                <input type="checkbox" name="select-drink" value="cofffe"><span>커피</span>
            </li>
            <li>
                <label for="date">참여하고 싶은 날짜</label>
                <input type="date">
            </li>
            <li>
                <label for="group">참여하고 싶은 그룹</label>
                <select name="group" id="group">
                    <option value="default">선택해주세요</option>
                    <option value="game">게임 모임</option>
                    <option value="music">음악감상 모임</option>
                    <option value="running">러닝 모임</option>
                </select>
            </li>
            <li>
                <label for="photfoilo">포토폴리오 제출</label>
                <button type="button">포토폴리오 업로드</button>
                <input type="file" name="photfoilo">
            </li>
            <li>
                <label for="intro">하고싶은 말(자기소개)</label>
                <textarea name="intro" id="intro" placeholder="50자 이내로 작성해주세요" cols="50" rows="10"></textarea>
            </li>
            <li>
                <button type="reset">다시하기</button>
                <button>제출하기</button>
            </li>
        </ul>
    </form>
</body>

</html>
